spring:
  application:
    name: account-movement-authorizer
  profiles:
    default: local
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  sqs:
    account-opening:
      enabled: false
      endpoint: http://localhost:4566
      region: sa-east-1
      queue-name: conta-bancaria-criada
      queue-url: http://localhost:4566/000000000000/conta-bancaria-criada
      access-key-id: test
      secret-access-key: test
      max-messages: 10
      wait-time-seconds: 10
      visibility-timeout-seconds: 30
      poll-delay-ms: 1000

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/account_authorizer
    username: account_authorizer
    password: account_authorizer
    driver-class-name: org.postgresql.Driver

server:
  port: 8080

app:
  sqs:
    account-opening:
      enabled: true

---
spring:
  config:
    activate:
      on-profile: test
  jpa:
    properties:
      hibernate:
        format_sql: false

server:
  port: 0

app:
  sqs:
    account-opening:
      enabled: false
