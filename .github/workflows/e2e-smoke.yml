name: E2E Smoke Validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-smoke:
    name: Docker Compose E2E smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run tests
        run: ./gradlew clean test --no-daemon

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Run E2E smoke validation
        run: bash scripts/e2e-transaction-scenarios.sh --start-stack --clean

      - name: Print Docker diagnostics on failure
        if: failure()
        run: |
          docker compose ps -a || true
          docker compose logs --no-color --tail=200 app postgres localstack message-generator || true

      - name: Cleanup Docker Compose
        if: always()
        run: docker compose down --remove-orphans -v
